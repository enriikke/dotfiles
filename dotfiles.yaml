# dotfiles.yaml - Configuration for the dotfiles CLI

# Files/directories to symlink from home/ to $HOME
symlinks:
  - .zshrc
  - .gitconfig
  - .tmux.conf
  - .ssh/config
  - .config/ghostty
  - .config/nvim
  - .config/zsh

# Package files (Homebrew on all platforms)
packages:
  brewfile: Brewfile
  brewfile_macos: Brewfile.macos

# Paths to check when looking for the dotfiles repo
repo_paths:
  - ~/.dotfiles
  - ~/dotfiles
